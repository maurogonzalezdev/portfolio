<div class="min-h-full w-12 absolute top-6 bottom-0  pb-12">
  <ul class="flex flex-col justify-between min-h-full items-center">
    <app-menu-item [setMenuItem]="getHomeItem" (click)="setIsNavBarVisible=!getIsNavBarVisible"></app-menu-item>

    <div>
      @for(item of getMenuItems; track item.name){
      <app-menu-item [setMenuItem]="item"></app-menu-item>
      }
    </div>
  </ul>
</div>
