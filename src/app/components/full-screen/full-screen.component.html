@if(!isFullScreen){
<div
  class="flex flex-row justify-center items-center h-6 w-9 bg-red-900 cursor-pointer"
  (click)="openFullscreen()"
>
  <ng-icon [name]="getIconName()" size="20" color="#fff"></ng-icon>
</div>
}@else {
<div
  class="flex flex-row justify-center items-center h-6 w-9 bg-blue-900 cursor-pointer"
  (click)="closeFullscreen()"
>
  <ng-icon [name]="getIconName()" size="20" color="#fff"></ng-icon>
</div>
}
